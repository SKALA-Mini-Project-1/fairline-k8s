apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fairline-apps
  namespace: fairline
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      monitoring: enabled
  namespaceSelector:
    matchNames:
      - fairline
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
