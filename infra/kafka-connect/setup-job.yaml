apiVersion: batch/v1
kind: Job
metadata:
  name: debezium-setup
  namespace: fairline
spec:
  # Re-run manually after connector config changes: kubectl delete job debezium-setup && kubectl apply -f setup-job.yaml
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Step 1: Create PostgreSQL PUBLICATION on RDS (must run before Debezium starts)
        - name: create-publication
          image: postgres:17
          command:
            - /bin/sh
            - -c
            - |
              echo "Creating Debezium publications on RDS..."
              PGPASSWORD="$DB_PASSWORD" psql \
                -h "$DB_HOST" \
                -U "$DB_USER" \
                -d "$DB_NAME" \
                -c "SELECT 1 FROM pg_publication WHERE pubname = 'debezium_payment_pub'" \
                -t | grep -q 1 || \
              PGPASSWORD="$DB_PASSWORD" psql \
                -h "$DB_HOST" \
                -U "$DB_USER" \
                -d "$DB_NAME" \
                -c "CREATE PUBLICATION debezium_payment_pub FOR TABLE payment.payment_events"

              PGPASSWORD="$DB_PASSWORD" psql \
                -h "$DB_HOST" \
                -U "$DB_USER" \
                -d "$DB_NAME" \
                -c "SELECT 1 FROM pg_publication WHERE pubname = 'debezium_ticketing_pub'" \
                -t | grep -q 1 || \
              PGPASSWORD="$DB_PASSWORD" psql \
                -h "$DB_HOST" \
                -U "$DB_USER" \
                -d "$DB_NAME" \
                -c "CREATE PUBLICATION debezium_ticketing_pub FOR TABLE ticketing.ticketing_outbox"

              echo "Publications ready."
          env:
            - name: DB_HOST
              value: "fairline-dev-postgres.c90c2ii6yx10.ap-northeast-2.rds.amazonaws.com"
            - name: DB_NAME
              value: "concert"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD

      containers:
        # Step 2: Wait for Kafka Connect and register connectors
        - name: register-connectors
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              CONNECT_URL="http://kafka-connect:8083"

              echo "Waiting for Kafka Connect..."
              until curl -sf "$CONNECT_URL/connectors" > /dev/null 2>&1; do
                sleep 5
              done
              echo "Kafka Connect ready."

              register_or_update() {
                NAME="$1"
                CONFIG="$2"
                EXISTS=$(curl -sf "$CONNECT_URL/connectors/$NAME" 2>/dev/null && echo yes || echo no)
                if [ "$EXISTS" = "yes" ]; then
                  echo "Updating connector: $NAME"
                  curl -sf -X PUT "$CONNECT_URL/connectors/$NAME/config" \
                    -H "Content-Type: application/json" \
                    -d "$CONFIG"
                else
                  echo "Registering connector: $NAME"
                  curl -sf -X POST "$CONNECT_URL/connectors" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"$NAME\",\"config\":$CONFIG}"
                fi
                echo ""
              }

              PAYMENT_CONFIG=$(cat <<EOF
              {
                "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
                "database.hostname": "$DB_HOST",
                "database.port": "5432",
                "database.user": "$DB_USER",
                "database.password": "$DB_PASSWORD",
                "database.dbname": "$DB_NAME",
                "topic.prefix": "fairline",
                "schema.include.list": "payment",
                "table.include.list": "payment.payment_events",
                "plugin.name": "pgoutput",
                "publication.name": "debezium_payment_pub",
                "publication.autocreate.mode": "disabled",
                "slot.name": "debezium_payment_slot",
                "key.converter": "org.apache.kafka.connect.json.JsonConverter",
                "key.converter.schemas.enable": "false",
                "value.converter": "org.apache.kafka.connect.json.JsonConverter",
                "value.converter.schemas.enable": "false",
                "transforms": "outbox",
                "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
                "transforms.outbox.table.field.event.id": "event_id",
                "transforms.outbox.table.field.event.type": "event_type",
                "transforms.outbox.table.field.event.payload": "payload_json",
                "transforms.outbox.table.field.event.key": "aggregate_id",
                "transforms.outbox.route.by.field": "aggregate_type",
                "transforms.outbox.route.topic.replacement": "payment.events.v1",
                "transforms.outbox.table.expand.json.payload": "true"
              }
              EOF
              )

              TICKETING_CONFIG=$(cat <<EOF
              {
                "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
                "database.hostname": "$DB_HOST",
                "database.port": "5432",
                "database.user": "$DB_USER",
                "database.password": "$DB_PASSWORD",
                "database.dbname": "$DB_NAME",
                "topic.prefix": "fairline",
                "schema.include.list": "ticketing",
                "table.include.list": "ticketing.ticketing_outbox",
                "plugin.name": "pgoutput",
                "publication.name": "debezium_ticketing_pub",
                "publication.autocreate.mode": "disabled",
                "slot.name": "debezium_ticketing_slot",
                "key.converter": "org.apache.kafka.connect.json.JsonConverter",
                "key.converter.schemas.enable": "false",
                "value.converter": "org.apache.kafka.connect.json.JsonConverter",
                "value.converter.schemas.enable": "false",
                "transforms": "outbox",
                "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
                "transforms.outbox.table.field.event.id": "event_id",
                "transforms.outbox.table.field.event.type": "event_type",
                "transforms.outbox.table.field.event.payload": "payload_json",
                "transforms.outbox.table.field.event.key": "aggregate_id",
                "transforms.outbox.route.by.field": "aggregate_type",
                "transforms.outbox.route.topic.replacement": "ticketing.events.v1",
                "transforms.outbox.table.expand.json.payload": "true"
              }
              EOF
              )

              register_or_update "payment-outbox-connector"   "$PAYMENT_CONFIG"
              register_or_update "ticketing-outbox-connector" "$TICKETING_CONFIG"

              echo "All connectors registered."
              curl -s "$CONNECT_URL/connectors" | tr ',' '\n'
          env:
            - name: DB_HOST
              value: "fairline-dev-postgres.c90c2ii6yx10.ap-northeast-2.rds.amazonaws.com"
            - name: DB_NAME
              value: "concert"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
