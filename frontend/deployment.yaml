apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fairline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: NotIn
                    values:
                      - g5.xlarge
      containers:
        - name: frontend
          image: 881490135253.dkr.ecr.ap-northeast-2.amazonaws.com/team4-frontend:06e458a7
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              value: ""
            - name: VITE_TOSS_CLIENT_KEY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: VITE_TOSS_CLIENT_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
