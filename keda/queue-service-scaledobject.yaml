apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: queue-service-scaledobject
  namespace: fairline
spec:
  scaleTargetRef:
    name: queue-service
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 4
  fallback:
    failureThreshold: 3
    replicas: 2
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          selectPolicy: Max
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 300
          selectPolicy: Min
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
            - type: Percent
              value: 50
              periodSeconds: 60
  triggers:
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        metricName: queue_service_rps
        query: |
          sum(rate(http_server_requests_seconds_count{namespace="fairline",job="queue-service",uri!~"/actuator.*"}[2m]))
        threshold: "10"
        activationThreshold: "1"
